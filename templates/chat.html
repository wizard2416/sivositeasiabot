<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat History - Asiacell Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .back-btn { padding: 10px 16px; background: #333; color: #fff; text-decoration: none; border-radius: 8px; font-size: 14px; }
        .back-btn:hover { background: #444; }
        .user-info { flex: 1; }
        .user-info h1 { font-size: 20px; color: #00d4aa; }
        .user-info p { color: #888; font-size: 14px; margin-top: 4px; }
        .chat-container { display: flex; flex-direction: column; gap: 12px; max-height: calc(100vh - 220px); overflow-y: auto; padding: 10px 0; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 16px; position: relative; word-wrap: break-word; }
        .message.user { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.bot { background: #00d4aa; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message .time { font-size: 10px; opacity: 0.7; margin-top: 6px; display: block; }
        .message .type-badge { font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        .pagination button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .pagination button:hover { background: #444; }
        .pagination button.active { background: #00d4aa; color: #000; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat { background: #1a1a1a; padding: 12px 20px; border-radius: 8px; text-align: center; }
        .stat .value { font-size: 24px; font-weight: bold; color: #00d4aa; }
        .stat .label { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/admin/messages" class="back-btn">Back</a>
            <div class="user-info">
                <h1 id="userName">Loading...</h1>
                <p id="userMeta"></p>
            </div>
        </div>
        <div class="stats">
            <div class="stat"><div class="value" id="totalMsgs">0</div><div class="label">Total Messages</div></div>
            <div class="stat"><div class="value" id="userMsgs">0</div><div class="label">User Messages</div></div>
            <div class="stat"><div class="value" id="botMsgs">0</div><div class="label">Bot Replies</div></div>
        </div>
        <div id="chatContainer" class="chat-container"></div>
        <div id="pagination" class="pagination"></div>
    </div>
    <script>
        const userId = window.location.pathname.split('/').pop();
        let currentPage = 1;
        let totalPages = 1;
        let allMessages = [];
        
        async function loadChat(page = 1) {
            currentPage = page;
            const resp = await fetch(`/admin/api/messages/${userId}?page=${page}&per_page=100`);
            const data = await resp.json();
            
            if (data.user) {
                document.getElementById('userName').textContent = `${data.user.first_name || 'Unknown'} ${data.user.username ? '@' + data.user.username : ''}`;
                document.getElementById('userMeta').textContent = `ID: ${data.user.user_id} | Balance: ${data.user.balance_iqd || 0} IQD | Joined: ${formatDate(data.user.created_at)}`;
            }
            
            allMessages = data.messages;
            totalPages = data.total_pages;
            document.getElementById('totalMsgs').textContent = data.total;
            
            let userCount = 0, botCount = 0;
            data.messages.forEach(m => { if (m.direction === 'user') userCount++; else botCount++; });
            document.getElementById('userMsgs').textContent = userCount;
            document.getElementById('botMsgs').textContent = botCount;
            
            renderMessages(data.messages);
            renderPagination();
        }
        
        function renderMessages(messages) {
            const container = document.getElementById('chatContainer');
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No messages yet</div>';
                return;
            }
            container.innerHTML = messages.map(m => `
                <div class="message ${m.direction}">
                    ${m.message_type !== 'text' ? `<span class="type-badge">${m.message_type}</span>` : ''}
                    ${escapeHtml(m.content)}
                    <span class="time">${formatDate(m.created_at)}</span>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="loadChat(${currentPage - 1})">Prev</button>`;
            html += `<span style="padding: 8px;">Page ${currentPage} of ${totalPages}</span>`;
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="loadChat(${currentPage + 1})">Next</button>`;
            container.innerHTML = html;
        }
        
        function formatDate(d) { return new Date(d).toLocaleString(); }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadChat();
    </script>
</body>
</html>
