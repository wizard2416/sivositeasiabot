{% extends "base.html" %}

{% block title %}Card Gallery{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-images"></i> Card Gallery</h2>
    <a href="/admin/cards" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Cards
    </a>
</div>

<div class="row g-4">
    {% for image in images %}
    <div class="col-md-3">
        <div class="card">
            <a href="/admin/cards/image/{{ image.filename }}" target="_blank">
                <img src="/admin/cards/image/{{ image.filename }}" class="card-img-top" alt="Card Image" style="height: 200px; object-fit: cover;">
            </a>
            <div class="card-body">
                <small class="text-muted">{{ image.filename }}</small>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12">
        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i> No card images found.
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
